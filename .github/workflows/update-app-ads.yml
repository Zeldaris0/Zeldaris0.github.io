name: Update app-ads.txt from CAS

on:
  schedule:
    - cron: "37 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-app-ads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest CAS app-ads.txt
        run: |
          curl -L --fail --silent --show-error \
            "https://raw.githubusercontent.com/cleveradssolutions/App-ads.txt/master/app-ads.txt" \
            -o app-ads.txt

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- app-ads.txt; then
            echo "No changes in app-ads.txt"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add app-ads.txt
          git commit -m "Update app-ads.txt from CAS"
          git push
